spring:
  servlet:
    multipart:
      max-file-size: ${MOOC_MULTIPART_MAX_FILE_SIZE:512MB}
      max-request-size: ${MOOC_MULTIPART_MAX_REQUEST_SIZE:512MB}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://192.168.150.101:3306/mooc?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:mooc}
    password: ${DB_PASSWORD:1234}
    hikari:
      initialization-fail-timeout: -1

  data:
    redis:
      host: ${REDIS_HOST:192.168.150.101}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:1234}
      database: ${REDIS_DATABASE:0}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:192.168.150.101:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:mooc-dev}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

mooc:
  auth:
    jwt:
      secret: ${JWT_SECRET:mooc-dev-secret-change-me-change-me-123456}
      access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:120}
      refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}
  qdrant:
    url: ${QDRANT_URL:http://192.168.150.101:6333}
    collection: ${QDRANT_COLLECTION:mooc_knowledge}
    vector-size: ${QDRANT_VECTOR_SIZE:1024}
    distance: ${QDRANT_DISTANCE:Cosine}
    auto-initialize: ${QDRANT_AUTO_INITIALIZE:true}
    timeout-seconds: ${QDRANT_TIMEOUT_SECONDS:10}
  ai:
    chat:
      provider: ${MOOC_AI_PROVIDER:bailian}
      base-url: ${MOOC_AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key-env: ${MOOC_AI_API_KEY_ENV:DASHSCOPE_API_KEY}
      model: ${MOOC_AI_CHAT_MODEL:qwen-plus}
      timeout-seconds: ${MOOC_AI_TIMEOUT_SECONDS:60}
      history-limit: ${MOOC_AI_CHAT_HISTORY_LIMIT:10}
      system-prompt: ${MOOC_AI_CHAT_SYSTEM_PROMPT:你是 MOOC 学习平台的 AI 助手，请用中文给出准确、简洁、适合学习场景的回答。}
    embedding:
      provider: ${MOOC_AI_PROVIDER:bailian}
      base-url: ${MOOC_AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key-env: ${MOOC_AI_API_KEY_ENV:DASHSCOPE_API_KEY}
      model: ${MOOC_AI_EMBEDDING_MODEL:text-embedding-v4}
      dimensions: ${MOOC_AI_EMBEDDING_DIMENSIONS:1024}
      timeout-seconds: ${MOOC_AI_TIMEOUT_SECONDS:60}
    segment:
      max-length: ${MOOC_SEGMENT_MAX_LENGTH:800}
      overlap-length: ${MOOC_SEGMENT_OVERLAP_LENGTH:100}
  storage:
    root-path: ${MOOC_STORAGE_ROOT:D:/mooc-storage}
    public-prefix: ${MOOC_STORAGE_PUBLIC_PREFIX:/files}
    max-file-size: ${MOOC_STORAGE_MAX_FILE_SIZE:536870912}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - video/mp4
      - application/pdf
      - text/plain
      - text/markdown
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
